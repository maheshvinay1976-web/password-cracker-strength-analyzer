<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🔐 Password Cracker & Strength Analyzer</h1>

<form method="POST">
    <input type="text" name="password" placeholder="Enter password" required>
    <button type="submit">Analyze</button>
</form>

{% if result %}
<div class="result">
    <p><b>Password:</b> {{ result.password }}</p>
    <p><b>Strength:</b> {{ result.strength }}</p>
    <p><b>Attempts to Crack:</b> {{ result.attempts }}</p>
    <p><b>Time Taken:</b> {{ result.time }} seconds</p>
</div>
{% endif %}

</body>
</html>
